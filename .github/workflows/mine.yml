name: Mine articles

on:
  # No cron — the miner is dispatched on demand: automatically by the files API
  # on every new VoiceDrop-*.m4a upload, and manually via the app's 加急处理 button.
  workflow_dispatch: {}

concurrency:
  group: mine
  cancel-in-progress: false

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install websocket-client
      - name: Mine
        run: python mining/mine.py
        env:
          FILES_TOKEN:           ${{ secrets.FILES_TOKEN }}
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          VOLC_ASR_APPID:        ${{ secrets.VOLC_ASR_APPID }}
          VOLC_ASR_ACCESS_TOKEN: ${{ secrets.VOLC_ASR_ACCESS_TOKEN }}
